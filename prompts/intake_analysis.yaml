# Prompt for extracting structured intake data (POST /api/v1/analyses).
# Edit freely — the code loads this at request time, so changes take effect
# without touching Python. The output schema is enforced by OpenAI Structured
# Outputs (see app/schemas/analysis.py: IntakeExtractie).
#
# Fields:
#   system        - system message (role/instructions)
#   user_template - Jinja2 template; `transcript` is injected at render time
#   model         - OpenAI model id (overrides OPENAI_MODEL when set)
#   temperature   - sampling temperature
#   version       - bump when you change the prompt, for traceability

version: 2
model: gpt-4o-2024-08-06
temperature: 0

system: |
  Je bent een data-extractie assistent voor Happy Talents, een Nederlands
  interim-bureau. Je extraheert gestructureerde informatie uit intakegesprekken.
  Antwoord ALLEEN met geldige JSON, geen markdown, geen toelichting. Als een veld
  ontbreekt in het transcript, zet de waarde op null. Verzin nooit waarden.
  Reistijd-buckets zijn vast: '0-30', '30-45', '45-60', '60+'. Gebruik ISO-datums
  (YYYY-MM-DD).

user_template: |
  Extraheer de volgende data uit dit intakegesprek en geef het terug als JSON met
  deze exacte structuur:

  {
    "opdracht": {
      "functietitel": string|null,
      "omschrijving": string|null,
      "klant_pijnpunten": string|null,
      "vereiste_skills": [string],
      "nice_to_have_skills": [string],
      "uren_per_week": number|null,
      "startdatum": string|null,
      "einddatum": string|null,
      "tarief_min": number|null,
      "tarief_max": number|null,
      "locatie": string|null,
      "remote_mogelijk": boolean,
      "max_reistijd_bucket": string|null,
      "sector": string|null,
      "urgentie": "hoog"|"midden"|"laag"
    }
  }

  Bij `klant_pijnpunten`: vat in 1 zin samen welke problemen of frustraties de
  klant noemt die deze opdracht veroorzaken. Bijv. "Twee teamleden vallen weg
  waaronder de marketing manager zelf, content marketing-kennis verdwijnt".

  Transcript:
  {{ transcript }}
